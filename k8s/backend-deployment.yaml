apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: customs-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: customsagent-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_URL
              value: "redis://redis-service:6379"
            - name: GROQ_KEY
              valueFrom:
                secretKeyRef:
                  name: customs-secrets
                  key: GROQ_KEY
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: customs-secrets
                  key: JWT_SECRET
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: customs-secrets
                  key: ENCRYPTION_KEY
            - name: EMAIL_USER
              valueFrom:
                secretKeyRef:
                  name: customs-secrets
                  key: EMAIL_USER
            - name: EMAIL_PASS
              valueFrom:
                secretKeyRef:
                  name: customs-secrets
                  key: EMAIL_PASS
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: customs-secrets
                  key: GOOGLE_CLIENT_ID
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: customs-secrets
                  key: DATABASE_URL
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
          volumeMounts:
            - name: backend-storage
              mountPath: /app/data
      volumes:
        - name: backend-storage
          persistentVolumeClaim:
            claimName: backend-pvc
